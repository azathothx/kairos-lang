<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="cmp-title">
  <title id="cmp-title">Why composition matters: cron stops at fixed patterns, RRULE at recurrence rules; Kairos expressions compose — every result is a stream that pipes into the next definition.</title>
  <!-- 比較ビジュアル（README 用・英語版）。配色・書体はロゴファミリー（assets/logo/）と共通。 -->
  <style>
    text { font-family: Ubuntu, 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: 'Ubuntu Mono', 'Cascadia Mono', Consolas, monospace; }
    .ink { fill: #24272B; }
    .sub { fill: #63686E; }
    .gold { fill: #A9701F; }
    .panel { fill: #F6F3EE; stroke: #E2DCD2; }
    .goldstroke { stroke: #A9701F; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #E8E6E3; }
      .sub { fill: #9BA1A8; }
      .gold { fill: #D9A44B; }
      .panel { fill: #23262B; stroke: #3A3F46; }
      .goldstroke { stroke: #D9A44B; }
    }
  </style>

  <!-- cron -->
  <rect x="40" y="30" width="1120" height="100" rx="14" class="panel" stroke-width="1.5"/>
  <text x="70" y="72" font-size="20" font-weight="600" class="ink">cron</text>
  <text x="70" y="105" font-size="17" class="mono ink">0 9 * * 1-5 <tspan class="sub" font-size="14">(9:00 on weekdays)</tspan></text>
  <text x="1130" y="72" font-size="15" class="sub" text-anchor="end">✗ fixed patterns — business days out of reach</text>

  <!-- RRULE -->
  <rect x="40" y="150" width="1120" height="100" rx="14" class="panel" stroke-width="1.5"/>
  <text x="70" y="192" font-size="20" font-weight="600" class="ink">iCalendar RRULE</text>
  <text x="70" y="225" font-size="17" class="mono ink">FREQ=MONTHLY;BYSETPOS=-1;BYDAY=MO,TU,WE,TH,FR <tspan class="sub" font-size="14">(last weekday of the month)</tspan></text>
  <text x="1130" y="192" font-size="15" class="sub" text-anchor="end">✗ recurrence only — results cannot feed the next rule</text>

  <!-- Kairos -->
  <rect x="40" y="270" width="1120" height="110" rx="14" class="panel goldstroke" stroke-width="2"/>
  <text x="70" y="314" font-size="20" font-weight="600" class="ink">Kairos</text>
  <text x="70" y="350" font-size="17" class="mono ink">monthEnd <tspan class="gold">|&gt;</tspan> roll(Preceding, on: bizDay) <tspan class="gold">|&gt;</tspan> shift(-3, unit: bizDay)</text>
  <text x="1130" y="314" font-size="15" text-anchor="end"><tspan class="gold" font-weight="700">✓</tspan> <tspan class="ink">closure — every result pipes into the next definition</tspan></text>
  <text x="70" y="374" font-size="14" class="mono sub"># 3 business days before month-end — holidays aware</text>
</svg>
