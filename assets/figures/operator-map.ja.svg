<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="opmap-title-ja">
  <title id="opmap-title-ja">Kairos の記述語の全体地図: 本体層の七族（生成子・窓・選択子・点変換・フィルタ・結合子・ストライド）を |> で合成し、射影が値式と接続、premise 層が語彙を供給する。</title>
  <!-- 演算子族マップ（reference/README 用・日本語版）。配色・書体はロゴファミリー（assets/logo/）と共通。
       左上のアイコンは kairos-pipe（|>）の再掲＝本図の主題そのもの。 -->
  <style>
    text { font-family: Ubuntu, 'Noto Sans CJK JP', 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic UI', Meiryo, sans-serif; }
    .mono { font-family: 'Ubuntu Mono', 'Noto Sans Mono CJK JP', Consolas, monospace; }
    .ink { fill: #24272B; }
    .sub { fill: #63686E; }
    .gold { fill: #A9701F; }
    .panel { fill: #F6F3EE; stroke: #E2DCD2; }
    .card { fill: #FBFAF8; stroke: #E2DCD2; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #E8E6E3; }
      .sub { fill: #9BA1A8; }
      .gold { fill: #D9A44B; }
      .panel { fill: #23262B; stroke: #3A3F46; }
      .card { fill: #2A2E34; stroke: #3A3F46; }
    }
  </style>
  <defs>
    <mask id="opmap-pipe-cut">
      <rect width="64" height="64" fill="#fff"/>
      <line x1="22" y1="20" x2="22" y2="44" stroke="#000" stroke-width="5.5" stroke-linecap="round"/>
      <polyline points="31,20 43,32 31,44" fill="none" stroke="#000" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>

  <!-- header -->
  <g transform="translate(40,16) scale(0.78)">
    <rect x="8" y="8" width="48" height="48" rx="13" class="gold" mask="url(#opmap-pipe-cut)"/>
  </g>
  <text x="102" y="52" font-size="24" font-weight="600" class="ink">記述語の全体地図</text>
  <text x="330" y="52" font-size="15" class="sub">——本体層は |&gt; で合成・premise 層が語彙を供給</text>

  <!-- body layer band -->
  <rect x="40" y="92" width="1120" height="210" rx="14" class="panel" stroke-width="1.5"/>
  <text x="62" y="124" font-size="16" font-weight="600" class="ink">本体層の七族</text>
  <text x="185" y="124" font-size="13" class="sub">全演算子＝(ストリーム…, premise) → ストリーム（閉包）</text>
  <rect x="60" y="146" width="140" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="76" y="174" font-size="15" font-weight="600" class="ink">生成子</text>
  <text x="76" y="198" font-size="13" class="mono sub">everyDay</text>
  <text x="76" y="218" font-size="13" class="mono sub">everyInstant</text>
  <text x="76" y="238" font-size="13" class="mono sub">テーブル(§3.8)</text>
  <text x="218" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="236" y="146" width="130" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="252" y="174" font-size="15" font-weight="600" class="ink">窓</text>
  <text x="252" y="198" font-size="13" class="mono sub">within</text>
  <text x="252" y="218" font-size="13" class="mono sub">segmentBy</text>
  <text x="384" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="402" y="146" width="120" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="418" y="174" font-size="15" font-weight="600" class="ink">選択子</text>
  <text x="418" y="198" font-size="13" class="mono sub">first / last</text>
  <text x="418" y="218" font-size="13" class="mono sub">nth</text>
  <text x="540" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="558" y="146" width="130" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="574" y="174" font-size="15" font-weight="600" class="ink">点変換</text>
  <text x="574" y="198" font-size="13" class="mono sub">roll / shift</text>
  <text x="574" y="218" font-size="13" class="mono sub">snapTo</text>
  <text x="574" y="238" font-size="13" class="mono sub">rebase</text>
  <text x="706" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="724" y="146" width="100" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="740" y="174" font-size="15" font-weight="600" class="ink">フィルタ</text>
  <text x="740" y="198" font-size="13" class="mono sub">filter</text>
  <text x="842" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="860" y="146" width="110" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="876" y="174" font-size="15" font-weight="600" class="ink">結合子</text>
  <text x="876" y="198" font-size="13" class="mono sub">| ・ &amp; ・ \</text>
  <text x="876" y="218" font-size="13" class="sub">（カスケード）</text>
  <text x="988" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="1006" y="146" width="130" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="1022" y="174" font-size="15" font-weight="600" class="ink">ストライド</text>
  <text x="1022" y="198" font-size="13" class="mono sub">stride</text>
  <text x="1022" y="218" font-size="13" class="mono sub">strideBy</text>

  <!-- projections band -->
  <rect x="40" y="322" width="1120" height="92" rx="14" class="panel" stroke-width="1.5"/>
  <text x="62" y="354" font-size="16" font-weight="600" class="ink">射影——窓 → 値</text>
  <text x="200" y="354" font-size="13" class="sub">（filter のラムダ・label: 式の中で使う。点はラベルを格納しない）</text>
  <text x="62" y="388" font-size="14" class="mono sub">ordinalIn(u, w, d)　　epochOrdinal(u, d)　　coincides(S, w, d)　　名前(d)＝束縛名射影　　W(v)＝窓インスタンス参照</text>

  <!-- premise layer band -->
  <rect x="40" y="434" width="1120" height="180" rx="14" class="panel" stroke-width="1.5"/>
  <text x="62" y="466" font-size="16" font-weight="600" class="ink">premise 層——語彙の供給</text>
  <text x="262" y="466" font-size="13" class="sub">（暦法・カレンダー・データ。評価は一方向＝premise → ストリーム）</text>
  <rect x="60" y="486" width="255" height="108" rx="10" class="card" stroke-width="1.2"/>
  <text x="76" y="514" font-size="15" font-weight="600" class="ink">窓生成語</text>
  <text x="76" y="538" font-size="13" class="mono sub">grid / span / split</text>
  <text x="76" y="558" font-size="13" class="mono sub">cycle（並列ラベル）</text>
  <rect x="335" y="486" width="255" height="108" rx="10" class="card" stroke-width="1.2"/>
  <text x="351" y="514" font-size="15" font-weight="600" class="ink">派生</text>
  <text x="351" y="538" font-size="13" class="mono sub">with（上書き）</text>
  <text x="351" y="558" font-size="13" class="mono sub">shiftBoundary（仮称）</text>
  <rect x="610" y="486" width="255" height="108" rx="10" class="card" stroke-width="1.2"/>
  <text x="626" y="514" font-size="15" font-weight="600" class="ink">データ</text>
  <text x="626" y="538" font-size="13" class="mono sub">テーブルリテラル</text>
  <text x="626" y="558" font-size="13" class="mono sub">external（実行時解決）</text>
  <rect x="885" y="486" width="255" height="108" rx="10" class="card" stroke-width="1.2"/>
  <text x="901" y="514" font-size="15" font-weight="600" class="ink">カレンダー実体</text>
  <text x="901" y="538" font-size="13" class="mono sub">nonWorking → bizDay</text>
  <text x="901" y="558" font-size="13" class="mono sub">sessionOpens/Closes → isOpen</text>
</svg>
