<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="opmap-title">
  <title id="opmap-title">The Kairos description-word map: seven body-layer families composed with |>; projections bridge windows to value expressions; the premise layer supplies the vocabulary.</title>
  <!-- 演算子族マップ（en/reference/README 用・英語版）。配色・書体はロゴファミリー（assets/logo/）と共通。
       左上のアイコンは kairos-pipe（|>）の再掲＝本図の主題そのもの。 -->
  <style>
    text { font-family: Ubuntu, 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: 'Ubuntu Mono', 'Cascadia Mono', Consolas, monospace; }
    .ink { fill: #24272B; }
    .sub { fill: #63686E; }
    .gold { fill: #A9701F; }
    .panel { fill: #F6F3EE; stroke: #E2DCD2; }
    .card { fill: #FBFAF8; stroke: #E2DCD2; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #E8E6E3; }
      .sub { fill: #9BA1A8; }
      .gold { fill: #D9A44B; }
      .panel { fill: #23262B; stroke: #3A3F46; }
      .card { fill: #2A2E34; stroke: #3A3F46; }
    }
  </style>
  <defs>
    <mask id="opmap-pipe-cut-en">
      <rect width="64" height="64" fill="#fff"/>
      <line x1="22" y1="20" x2="22" y2="44" stroke="#000" stroke-width="5.5" stroke-linecap="round"/>
      <polyline points="31,20 43,32 31,44" fill="none" stroke="#000" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>

  <!-- header -->
  <g transform="translate(40,16) scale(0.78)">
    <rect x="8" y="8" width="48" height="48" rx="13" class="gold" mask="url(#opmap-pipe-cut-en)"/>
  </g>
  <text x="102" y="52" font-size="24" font-weight="600" class="ink">The description-word map</text>
  <text x="545" y="52" font-size="15" class="sub">— the body layer composes with |&gt;; the premise layer supplies the vocabulary</text>

  <!-- body layer band -->
  <rect x="40" y="92" width="1120" height="210" rx="14" class="panel" stroke-width="1.5"/>
  <text x="62" y="124" font-size="16" font-weight="600" class="ink">The seven body-layer families</text>
  <text x="420" y="124" font-size="13" class="sub">every operator = (stream…, premise) → stream (closure)</text>
  <rect x="60" y="146" width="140" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="76" y="174" font-size="15" font-weight="600" class="ink">Generators</text>
  <text x="76" y="198" font-size="13" class="mono sub">everyDay</text>
  <text x="76" y="218" font-size="13" class="mono sub">everyInstant</text>
  <text x="76" y="238" font-size="13" class="mono sub">tables (§3.8)</text>
  <text x="218" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="236" y="146" width="130" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="252" y="174" font-size="15" font-weight="600" class="ink">Windows</text>
  <text x="252" y="198" font-size="13" class="mono sub">within</text>
  <text x="252" y="218" font-size="13" class="mono sub">segmentBy</text>
  <text x="384" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="402" y="146" width="120" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="418" y="174" font-size="15" font-weight="600" class="ink">Selectors</text>
  <text x="418" y="198" font-size="13" class="mono sub">first / last</text>
  <text x="418" y="218" font-size="13" class="mono sub">nth</text>
  <text x="540" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="558" y="146" width="130" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="574" y="174" font-size="15" font-weight="600" class="ink">Point transforms</text>
  <text x="574" y="198" font-size="13" class="mono sub">roll / shift</text>
  <text x="574" y="218" font-size="13" class="mono sub">snapTo</text>
  <text x="574" y="238" font-size="13" class="mono sub">rebase</text>
  <text x="706" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="724" y="146" width="100" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="740" y="174" font-size="15" font-weight="600" class="ink">Filter</text>
  <text x="740" y="198" font-size="13" class="mono sub">filter</text>
  <text x="842" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="860" y="146" width="110" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="876" y="174" font-size="15" font-weight="600" class="ink">Combinators</text>
  <text x="876" y="198" font-size="13" class="mono sub">| ・ &amp; ・ \</text>
  <text x="876" y="218" font-size="13" class="sub">(cascade)</text>
  <text x="988" y="218" font-size="18" font-weight="700" class="mono gold">|&gt;</text>
  <rect x="1006" y="146" width="130" height="132" rx="10" class="card" stroke-width="1.2"/>
  <text x="1022" y="174" font-size="15" font-weight="600" class="ink">Strides</text>
  <text x="1022" y="198" font-size="13" class="mono sub">stride</text>
  <text x="1022" y="218" font-size="13" class="mono sub">strideBy</text>

  <!-- projections band -->
  <rect x="40" y="322" width="1120" height="92" rx="14" class="panel" stroke-width="1.5"/>
  <text x="62" y="354" font-size="16" font-weight="600" class="ink">Projections — window → value</text>
  <text x="395" y="354" font-size="13" class="sub">(used inside filter lambdas and label: expressions; points store no labels)</text>
  <text x="62" y="388" font-size="14" class="mono sub">ordinalIn(u, w, d) · epochOrdinal(u, d) · coincides(S, w, d) · name(d) = binding-name projection · W(v) = window-instance reference</text>

  <!-- premise layer band -->
  <rect x="40" y="434" width="1120" height="180" rx="14" class="panel" stroke-width="1.5"/>
  <text x="62" y="466" font-size="16" font-weight="600" class="ink">The premise layer — supplies the vocabulary</text>
  <text x="625" y="466" font-size="13" class="sub">(calendars, data — evaluation is one-way = premise → stream)</text>
  <rect x="60" y="486" width="255" height="108" rx="10" class="card" stroke-width="1.2"/>
  <text x="76" y="514" font-size="15" font-weight="600" class="ink">Window-generating words</text>
  <text x="76" y="538" font-size="13" class="mono sub">grid / span / split</text>
  <text x="76" y="558" font-size="13" class="mono sub">cycle (parallel labels)</text>
  <rect x="335" y="486" width="255" height="108" rx="10" class="card" stroke-width="1.2"/>
  <text x="351" y="514" font-size="15" font-weight="600" class="ink">Derivation</text>
  <text x="351" y="538" font-size="13" class="mono sub">with (override)</text>
  <text x="351" y="558" font-size="13" class="mono sub">shiftBoundary (placeholder)</text>
  <rect x="610" y="486" width="255" height="108" rx="10" class="card" stroke-width="1.2"/>
  <text x="626" y="514" font-size="15" font-weight="600" class="ink">Data</text>
  <text x="626" y="538" font-size="13" class="mono sub">table literal</text>
  <text x="626" y="558" font-size="13" class="mono sub">external (run-time resolved)</text>
  <rect x="885" y="486" width="255" height="108" rx="10" class="card" stroke-width="1.2"/>
  <text x="901" y="514" font-size="15" font-weight="600" class="ink">Calendar entities</text>
  <text x="901" y="538" font-size="13" class="mono sub">nonWorking → bizDay</text>
  <text x="901" y="558" font-size="13" class="mono sub">sessionOpens/Closes → isOpen</text>
</svg>
