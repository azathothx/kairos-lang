<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Kairos">
  <!-- Kairos モノグラム（K＝縦棒＋山形の二部品。|> アイコンと部品共有）。金プレート・白抜きは透過。 -->
  <style>
    .plate { fill: #A9701F; }
    @media (prefers-color-scheme: dark) { .plate { fill: #D9A44B; } }
  </style>
  <defs>
    <mask id="kairos-mark-cut">
      <rect width="64" height="64" fill="#fff"/>
      <line x1="21" y1="20" x2="21" y2="44" stroke="#000" stroke-width="5.5" stroke-linecap="round"/>
      <polyline points="43,20 31,32 43,44" fill="none" stroke="#000" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <rect x="8" y="8" width="48" height="48" rx="13" class="plate" mask="url(#kairos-mark-cut)"/>
</svg>
